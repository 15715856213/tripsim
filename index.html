<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TripSim - 旅行副本模拟器</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
    <script>
      ;(function (l) {
        if (!l.search || l.search.length < 2) return
        const decodedSearch = decodeURIComponent(l.search.slice(1))
        if (decodedSearch[0] !== '/') return
        const decoded = decodedSearch
          .replace(/~and~/g, '&')
          .replace(/=$/, '')
          .split('&')
          .join('?')
        window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
