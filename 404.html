<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      const segmentCount = 1
      const l = window.location
      const pathSegments = l.pathname.split('/').slice(0, 1 + segmentCount).join('/')
      const redirectPath = l.pathname
        .split('/')
        .slice(1 + segmentCount)
        .join('/')
        .replace(/&/g, '~and~')
      const search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : ''
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + pathSegments + '/?/' + redirectPath + search + l.hash)
    </script>
  </head>
  <body></body>
</html>
